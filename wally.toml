[package]
name = "biel/shooter"
version = "0.1.0"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[dependencies]
# --- NÚCLEO Y DATOS ---
profilestore = "vyon/profilestore@1.0.3"
# Sucesor de ProfileService. Maneja el guardado de datos con Session Locking.

# --- NETWORKING (RENDIMIENTO EXTREMO) ---
bytenet = "howmanysmall/bytenet@0.4.7"

# --- UTILIDADES Y GESTIÓN DE MEMORIA ---
janitor = "howmanysmall/janitor@1.18.3"
# El estándar para evitar Memory Leaks. Limpia conexiones y objetos automáticamente.

typed-promise = "howmanysmall/typed-promise@4.0.6"
# Gestión asíncrona (cargar mapas, esperar datos) sin bloquear el servidor.

# --- INTERFAZ DE USUARIO ---
fusion = "elttob/fusion@0.3.0"
# UI reactiva para que tus menús e inventarios no consuman CPU innecesaria.